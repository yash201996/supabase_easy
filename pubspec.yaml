name: supabase_easy
description: >-
  Supabase wrapper for Flutter that cuts Auth, CRUD, real-time, and Storage
  boilerplate by 60–70%. Type-safe, zero config, single import.
version: 0.1.0
repository: https://github.com/yash201996/supabase_easy
issue_tracker: https://github.com/yash201996/supabase_easy/issues

topics:
  - supabase
  - authentication
  - database
  - storage
  - realtime

environment:
  sdk: ^3.10.7
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

